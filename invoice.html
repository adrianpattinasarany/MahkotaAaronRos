<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembuat Invoice TIP TOP</title>
    <!-- Google Fonts Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            red: '#C1121F',
                            darkred: '#780000',
                            yellow: '#F2BB05',
                            cream: '#FDF0D5',
                            dark: '#121212',
                            panel: '#1A1A1A'
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>
    <style>
        body {
            background-color: transparent;
            color: #FDF0D5;
        }
        .glass-panel {
            background: rgba(26, 26, 26, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="font-sans p-2">

<div class="max-w-4xl mx-auto space-y-6">
    <div class="glass-panel p-8 rounded-3xl space-y-6 relative">
        <div class="flex items-center space-x-3 border-b border-white/5 pb-4">
            <span class="text-2xl">📝</span>
            <div>
                <h2 class="text-xl font-extrabold text-brand-yellow">Pembuat Invoice TipTop</h2>
                <p class="text-xs text-gray-400 font-semibold tracking-wider uppercase">Konversi Otomatis Excel Transaksi TipTop ke Word (.docx)</p>
            </div>
        </div>

        <!-- File Upload Input Area -->
        <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Pilih File Excel Transaksi TipTop (.xls, .xlsx)</label>
            <div class="border-2 border-dashed border-white/10 hover:border-brand-yellow/50 rounded-2xl p-6 text-center transition-all bg-black/20 relative cursor-pointer group" id="excel-drop-zone">
                <input type="file" id="excelFile" accept=".xls,.xlsx" class="absolute inset-0 opacity-0 cursor-pointer" onchange="handleExcelSelect(this)">
                <span class="text-3xl block mb-2 group-hover:scale-110 transition-transform">📊</span>
                <p class="text-sm font-semibold text-gray-300" id="excel-file-name">Drag & drop file Excel atau klik untuk memilih</p>
                <p class="text-xs text-gray-500 mt-1">Mendukung berkas Excel TipTop (.xlsx, .xls)</p>
            </div>
        </div>

        <div class="grid sm:grid-cols-2 gap-6">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Prefix Nomor Surat</label>
                <input type="text" id="prefix" class="w-full bg-[#222] border border-white/10 px-4 py-3 rounded-xl focus:outline-none focus:border-brand-yellow focus:ring-1 focus:ring-brand-yellow transition-all" value="SI">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Nomor Urut Awal</label>
                <input type="number" id="startNumber" class="w-full bg-[#222] border border-white/10 px-4 py-3 rounded-xl focus:outline-none focus:border-brand-yellow focus:ring-1 focus:ring-brand-yellow transition-all" value="1">
            </div>
        </div>

        <div class="grid sm:grid-cols-2 gap-6">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Tanggal Invoice (Opsional)</label>
                <input type="date" id="invoiceDate" class="w-full bg-[#222] border border-white/10 px-4 py-3 rounded-xl focus:outline-none focus:border-brand-yellow focus:ring-1 focus:ring-brand-yellow transition-all text-white">
                <span class="text-[10px] text-gray-400 mt-1 block">Kosongkan untuk menggunakan tanggal hari ini</span>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Gambar Header Kustom (PNG/JPG)</label>
                <input type="file" id="headerImage" accept="image/png,image/jpeg,image/jpg" class="w-full bg-[#222] border border-white/10 px-4 py-2.5 rounded-xl focus:outline-none text-sm text-gray-400">
            </div>
        </div>

        <div class="pt-2">
            <button onclick="processDocx()" class="w-full py-4 rounded-xl font-extrabold text-black bg-brand-yellow hover:bg-yellow-500 transition-all shadow-lg hover:scale-[1.02] flex items-center justify-center space-x-2 text-md">
                <span>Unduh Invoice Word (.docx)</span>
            </button>
        </div>
    </div>
</div>

<script>

        const fileNameEl = document.getElementById('excel-file-name');

            fileNameEl.classList.remove('text-gray-300');
            fileNameEl.classList.add('text-brand-yellow', 'font-bold');
        } else {
            fileNameEl.textContent = "Drag & drop file Excel atau klik untuk memilih";
            fileNameEl.classList.add('text-gray-300');
            fileNameEl.classList.remove('text-brand-yellow', 'font-bold');
        }

    function base64ToUint8Array(base64) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        return bytes;
    }

    function formatNumber(n) {
        return new Intl.NumberFormat('id-ID', { minimumFractionDigits: 0, maximumFractionDigits: 2 }).format(n);
    }

    function terbilang(n) {
        if (n === 0) return "Nol rupiah";
        const ones = ["", "satu", "dua", "tiga", "empat", "lima", "enam", "tujuh", "delapan", "sembilan", "sepuluh", "sebelas"];
        
        function convert(n) {
            if (n < 12) return ones[n];
            if (n < 20) return convert(n - 10) + " belas";
            if (n < 100) return convert(Math.floor(n / 10)) + " puluh " + convert(n % 10);
            if (n < 200) return "seratus " + convert(n - 100);
            if (n < 1000) return convert(Math.floor(n / 100)) + " ratus " + convert(n % 100);
            if (n < 2000) return "seribu " + convert(n - 1000);
            if (n < 1000000) return convert(Math.floor(n / 1000)) + " ribu " + convert(n % 1000);
            if (n < 1000000000) return convert(Math.floor(n / 1000000)) + " juta " + convert(n % 1000000);
            return convert(Math.floor(n / 1000000000)) + " miliar " + convert(n % 1000000000);
        }
        
        let res = convert(Math.floor(n)).trim().replace(/\s+/g, ' ');
        return res.charAt(0).toUpperCase() + res.slice(1) + " rupiah";
    }

    function formatDateId(date) {
        if (!(date instanceof Date) || Number.isNaN(date.getTime())) return "";
        return date.toLocaleDateString('id-ID', { day: '2-digit', month: '2-digit', year: '2-digit' });
    }

    function extractInvoiceData(rows) {
        let promoStart = null, promoEnd = null;
        const outlets = {};
        let currentOutlet = null;

        rows.forEach((row) => {
            row.forEach(cell => {
                if (cell instanceof Date) {
                    if (!promoStart) promoStart = cell;
                    else if (!promoEnd) promoEnd = cell;
                }
            });

            let col0 = String(row[0] || "").trim();
            let outletMatch = col0.match(/^(\d{4})\s+(.+)$/);

            if (outletMatch && !(row[8] instanceof Date)) {
                let name = (outletMatch[2] + " " + (row[1] || "")).trim();
                currentOutlet = name;
                outlets[name] = {
                    code: outletMatch[1],
                    name: name,
                    supplierCode: null,
                    supplierName: null,
                    brand: null,
                    dataRows: []
                };
            } else if (currentOutlet && row[8] instanceof Date) {
                const o = outlets[currentOutlet];
                if (!o.supplierCode) {
                    o.supplierCode = col0;
                    o.supplierName = String(row[1] || "").trim();
                    o.brand = String(row[2] || "").trim();
                }
                o.dataRows.push({
                    sku: row[3], product: row[4], size: row[5], uom: row[6],
                    internal: row[7], date: row[8], qty: row[9] || 0,
                    gross: row[10] || 0, incl: row[12] || 0, tax: row[13] || 0,
                    excl: row[14] || 0, com: row[15] || 0, mu: row[17] || 0, inv: row[18] || 0
                });
            }
        });

        return { promoStart, promoEnd, outlets };
    }

    async function processDocx() {
        const fileInput = document.getElementById('excelFile');
        if (!fileInput.files.length) return alert("Silakan pilih file terlebih dahulu.");
        if (typeof docx === 'undefined') return alert("Pustaka DOCX gagal dimuat.");

        const reader = new FileReader();
        reader.onload = async function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array', cellDates: true });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
            const headerFile = document.getElementById('headerImage').files[0];
            const headerBytes = headerFile
                ? new Uint8Array(await headerFile.arrayBuffer())
                : base64ToUint8Array(DEFAULT_HEADER_BASE64);

            const invoiceData = extractInvoiceData(rows);
            await buildDocx(invoiceData, headerBytes);
        };
        reader.readAsArrayBuffer(fileInput.files[0]);
    }

    async function buildDocx(invoiceData, headerBytes) {
        const { promoEnd, outlets } = invoiceData;
        const startNum = parseInt(document.getElementById('startNumber').value) || 1;
        const prefix = document.getElementById('prefix').value || "SI";
        const manualDate = document.getElementById('invoiceDate').value;
        const invDate = manualDate ? new Date(manualDate) : new Date();
        const invoiceNames = Object.keys(outlets);

        const {
            Document,
            Packer,
            Paragraph,
            TextRun,
            Table,
            TableRow,
            TableCell,
            AlignmentType,
            WidthType,
            BorderStyle,
            PageBreak,
            Header,
            ImageRun,
            TabStopType
        } = docx;

        const columnWidths = [6, 18, 7, 6, 6, 8, 5, 8, 8, 8, 8, 6, 8, 8];

        function textCell(text, options = {}) {
            return new TableCell({
                width: { size: options.width || 0, type: WidthType.PERCENTAGE },
                margins: { top: 20, bottom: 20, left: 40, right: 40 },
                children: [new Paragraph({
                    children: [new TextRun({
                        text: String(text ?? ""),
                        bold: !!options.bold,
                        size: options.size || 12,
                        font: "Times New Roman"
                    })],
                    alignment: options.alignment || AlignmentType.LEFT,
                })],
            });
        }

        function numberCell(text, options = {}) {
            return textCell(text, { ...options, alignment: AlignmentType.RIGHT });
        }

        function centeredCell(text, options = {}) {
            return textCell(text, { ...options, alignment: AlignmentType.CENTER });
        }

        function buildInvoiceSection(o, invNo, billingStr) {
            let totals = { qty: 0, gross: 0, incl: 0, tax: 0, excl: 0, mu: 0, inv: 0 };

            const dataRows = o.dataRows.map(r => {
                totals.qty += Number(r.qty) || 0;
                totals.gross += Number(r.gross) || 0;
                totals.incl += Number(r.incl) || 0;
                totals.tax += Number(r.tax) || 0;
                totals.excl += Number(r.excl) || 0;
                totals.mu += Number(r.mu) || 0;
                totals.inv += Number(r.inv) || 0;

                return new TableRow({
                    children: [
                        centeredCell(r.sku, { width: columnWidths[0] }),
                        textCell(r.product, { width: columnWidths[1] }),
                        centeredCell(r.size, { width: columnWidths[2] }),
                        centeredCell(r.uom, { width: columnWidths[3] }),
                        centeredCell(r.internal, { width: columnWidths[4] }),
                        centeredCell(formatDateId(r.date), { width: columnWidths[5] }),
                        centeredCell(r.qty, { width: columnWidths[6] }),
                        numberCell(formatNumber(r.gross), { width: columnWidths[7] }),
                        numberCell(formatNumber(r.incl), { width: columnWidths[8] }),
                        numberCell(formatNumber(r.tax), { width: columnWidths[9] }),
                        numberCell(formatNumber(r.excl), { width: columnWidths[10] }),
                        centeredCell(r.com, { width: columnWidths[11] }),
                        numberCell(formatNumber(r.mu), { width: columnWidths[12] }),
                        numberCell(formatNumber(r.inv), { width: columnWidths[13] }),
                    ]
                });
            });

            const headerRow = new TableRow({
                children: [
                    centeredCell("SKU#", { bold: true, width: columnWidths[0] }),
                    centeredCell("Nama Produk", { bold: true, width: columnWidths[1] }),
                    centeredCell("Ukuran", { bold: true, width: columnWidths[2] }),
                    centeredCell("Satuan", { bold: true, width: columnWidths[3] }),
                    centeredCell("No Internal", { bold: true, width: columnWidths[4] }),
                    centeredCell("Tanggal", { bold: true, width: columnWidths[5] }),
                    centeredCell("Qty", { bold: true, width: columnWidths[6] }),
                    centeredCell("Bruto", { bold: true, width: columnWidths[7] }),
                    centeredCell("Termasuk Pajak", { bold: true, width: columnWidths[8] }),
                    centeredCell("Pajak", { bold: true, width: columnWidths[9] }),
                    centeredCell("Tanpa Pajak", { bold: true, width: columnWidths[10] }),
                    centeredCell("%Kom", { bold: true, width: columnWidths[11] }),
                    centeredCell("Nominal MU", { bold: true, width: columnWidths[12] }),
                    centeredCell("Nominal Inv", { bold: true, width: columnWidths[13] }),
                ]
            });

            const totalRow = new TableRow({
                children: [
                    centeredCell("", { width: columnWidths[0] }),
                    centeredCell("", { width: columnWidths[1] }),
                    centeredCell("", { width: columnWidths[2] }),
                    centeredCell("", { width: columnWidths[3] }),
                    centeredCell("", { width: columnWidths[4] }),
                    centeredCell("", { width: columnWidths[5] }),
                    centeredCell(totals.qty, { bold: true, width: columnWidths[6] }),
                    numberCell(formatNumber(totals.gross), { bold: true, width: columnWidths[7] }),
                    numberCell(formatNumber(totals.incl), { bold: true, width: columnWidths[8] }),
                    numberCell(formatNumber(totals.tax), { bold: true, width: columnWidths[9] }),
                    numberCell(formatNumber(totals.excl), { bold: true, width: columnWidths[10] }),
                    centeredCell("", { width: columnWidths[11] }),
                    numberCell(formatNumber(totals.mu), { bold: true, width: columnWidths[12] }),
                    numberCell(formatNumber(totals.inv), { bold: true, width: columnWidths[13] }),
                ]
            });

            return [
                new Paragraph({
                    alignment: AlignmentType.CENTER,
                    spacing: { before: 20, after: 120 },
                    children: [new TextRun({ text: "Invoice", bold: true, size: 24, font: "Times New Roman" })]
                }),
                new Paragraph({
                    tabStops: [{ type: TabStopType.RIGHT, position: 9100 }],
                    children: [
                        new TextRun({ text: `Nomor        : ${invNo}`, font: "Times New Roman", size: 22 }),
                        new TextRun({ text: "\t" }),
                        new TextRun({ text: `Tanggal: ${invDate.getDate()} ${MONTHS_ID[invDate.getMonth() + 1]} ${invDate.getFullYear()}`, font: "Times New Roman", size: 22 }),
                    ],
                    spacing: { after: 140 }
                }),
                new Paragraph({ spacing: { after: 0 }, children: [new TextRun({ text: "Kepada Yth.", font: "Times New Roman", size: 24 })] }),
                new Paragraph({ spacing: { after: 0 }, children: [new TextRun({ text: "Bapak/Ibu Toko TipTop", font: "Times New Roman", size: 24 })] }),
                new Paragraph({ spacing: { after: 120 }, children: [new TextRun({ text: `Cabang: ${String(o.name || "").replace(/^tip\s*top\s*[-:]?\s*/i, "").replace(/^tiptop\s*[-:]?\s*/i, "").trim().toLowerCase().replace(/\b\w/g, l => l.toUpperCase())}`, font: "Times New Roman", size: 24 })] }),
                new Paragraph({ spacing: { after: 0 }, children: [new TextRun({ text: `Tagihan Bulan : ${billingStr}`, font: "Times New Roman", size: 24 })] }),
                new Paragraph({ spacing: { after: 0 }, children: [new TextRun({ text: `Kode & Nama Pemasok : ${o.supplierCode || ""} ${o.supplierName || ""}`, font: "Times New Roman", size: 24 })] }),
                new Paragraph({ spacing: { after: 120 }, children: [new TextRun({ text: `Kode & Nama Merek : ${o.brand || ""}`, font: "Times New Roman", size: 24 })] }),
                new Table({
                    width: { size: 100, type: WidthType.PERCENTAGE },
                    borders: {
                        top: { style: BorderStyle.SINGLE, size: 1, color: "000000" },
                        bottom: { style: BorderStyle.SINGLE, size: 1, color: "000000" },
                        left: { style: BorderStyle.SINGLE, size: 1, color: "000000" },
                        right: { style: BorderStyle.SINGLE, size: 1, color: "000000" },
                        insideHorizontal: { style: BorderStyle.SINGLE, size: 1, color: "000000" },
                        insideVertical: { style: BorderStyle.SINGLE, size: 1, color: "000000" },
                    },
                    rows: [headerRow, ...dataRows, totalRow]
                }),
                new Paragraph({ spacing: { before: 180, after: 60 }, children: [new TextRun({ text: `Jumlah Invoice : Rp ${formatNumber(totals.inv)}`, bold: true, size: 22, font: "Times New Roman" })] }),
                new Paragraph({ spacing: { after: 220 }, children: [new TextRun({ text: `Terbilang: ${terbilang(totals.inv)}`, bold: true, size: 22, font: "Times New Roman" })] }),
                new Paragraph({ alignment: AlignmentType.RIGHT, spacing: { after: 520 }, children: [new TextRun({ text: "Mahkota AaronRos,", font: "Times New Roman", size: 24 })] }),
                new Paragraph({
                    alignment: AlignmentType.RIGHT,
                    spacing: { after: 0 },
                    children: [new TextRun({ text: "ROSNIATI, ST", underline: { type: "single" }, font: "Times New Roman", size: 24 })]
                }),
            ];
        }

        const docChildren = [];
        invoiceNames.forEach((name, index) => {
            const o = outlets[name];
            const seq = startNum + index;
            const invNo = `${prefix}.${String(seq).padStart(3, '0')}/MC/${ROMAN[invDate.getMonth()]}/${invDate.getFullYear()}`;

            let billingStr = "";
            if (promoEnd) {
                let m = (promoEnd.getMonth() + 1) % 12 + 1;
                let y = promoEnd.getFullYear() + (promoEnd.getMonth() === 11 ? 1 : 0);
                billingStr = `${MONTHS_ID[m]} ${y}`;
            }

            docChildren.push(...buildInvoiceSection(o, invNo, billingStr));
            if (index < invoiceNames.length - 1) {
                docChildren.push(new Paragraph({ children: [new PageBreak()] }));
            }
        });

        const docHeader = headerBytes ? {
            default: new Header({
                children: [
                    new Paragraph({
                        alignment: AlignmentType.CENTER,
                        spacing: { after: 40 },
                        children: [
                            new ImageRun({
                                data: headerBytes,
                                transformation: { width: 680, height: 150 }
                            })
                        ]
                    })
                ]
            })
        } : undefined;

        const doc = new Document({
            sections: [{
                headers: docHeader,
                properties: {
                    page: {
                        margin: {
                            top: 1650,
                            right: 1020,
                            bottom: 850,
                            left: 1020,
                        },
                    },
                },
                children: docChildren
            }]
        });
        const blob = await Packer.toBlob(doc);
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `TIP_TOP_Invoice_${invDate.getFullYear()}_${String(invDate.getMonth() + 1).padStart(2, '0')}.docx`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
    }

</script>

</body>
</html>
